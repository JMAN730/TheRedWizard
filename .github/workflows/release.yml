name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Blocking validation (XML, PO, py_compile)
        run: |
          pip install polib
          python tools/validate_sources.py

      - name: Build bundle
        run: python tools/build_repo.py --bundle "$TAG"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$TAG" in
            *-*) PRERELEASE=--prerelease ;;
            *)   PRERELEASE= ;;
          esac
          gh release create "$TAG" $PRERELEASE --generate-notes \
            --notes "Channel zips unpack over the matching server directory; then run \`python3 merge_addons.py <server addons.xml> <addons.repo-owned.xml>\` per channel. See docs/RELEASING.md." \
            dist/redwizard-repo-*.zip tools/merge_addons.py
