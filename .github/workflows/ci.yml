# Two-tier CI validation.
# Blocking tier must stay green; advisory tier reports kodi-addon-checker
# noise in the job summary and never fails the build.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Blocking checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Blocking validation (XML, PO, py_compile)
        run: |
          pip install polib
          python tools/validate_sources.py

      - name: Repo build dry-run
        run: python tools/build_repo.py --out /tmp/repo-out

  # Permanently-accepted advisory noise (decided in issue #20) — the checker
  # findings below are deliberate and will not be fixed; don't chase them:
  #   - skin.carpc-xtouch_me screenshots are 1024x600: the native resolution
  #     of the car-PC displays the skin targets; upscaling would misrepresent it
  #   - repository.redwizard <dir minversion/maxversion>: checker false
  #     positive — Kodi supports these and the multi-channel repo needs them
  #   - "Complex entry point" warnings: style opinion, not adopted
  #   - .xbt non-whitelisted file endings: compiled textures are mandatory
  #     for skins
  addon-checker:
    name: Advisory kodi-addon-checker (never blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install checker
        run: pip install kodi-addon-checker
      - name: Run checker (advisory)
        run: |
          set +e
          PY_ADDONS=$(python -c "
          import json
          m = json.load(open('channels.json'))
          print(' '.join(a for a, ch in sorted(m.items()) if not a.startswith('skin.')))")
          kodi-addon-checker $PY_ADDONS --branch omega --skip-dependency-checks 2>&1 \
            | sed 's/\x1b\[[0-9;]*m//g' > checker.log
          kodi-addon-checker skin.carpc-xtouch_me --branch piers --skip-dependency-checks 2>&1 \
            | sed 's/\x1b\[[0-9;]*m//g' >> checker.log
          {
            echo "## kodi-addon-checker (advisory)"
            echo '```'
            grep -cE '^ERROR:' checker.log | xargs -I{} echo "problems reported: {}"
            grep -cE '^WARN:'  checker.log | xargs -I{} echo "warnings reported: {}"
            echo '```'
            echo "<details><summary>Problems</summary>"
            echo ""
            echo '```'
            grep -E '^ERROR:' checker.log | head -60
            echo '```'
            echo "</details>"
            echo "<details><summary>Warning categories</summary>"
            echo ""
            echo '```'
            grep -E '^WARN:' checker.log | sed -E 's/(filename|url:|file ).*//' | sort | uniq -c | sort -rn | head -15
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0
